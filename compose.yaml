name: mindroom-stack

services:
  tuwunel:
    image: ${MINDROOM_TUWUNEL_IMAGE:-ghcr.io/mindroom-ai/mindroom-tuwunel:latest}
    environment:
      TUWUNEL_SERVER_NAME: ${MATRIX_SERVER_NAME:-matrix.localhost}
      TUWUNEL_DATABASE_PATH: /var/lib/tuwunel
      TUWUNEL_PORT: 8008
      TUWUNEL_ADDRESS: 0.0.0.0
      TUWUNEL_ALLOW_REGISTRATION: "true"
      TUWUNEL_YES_I_AM_VERY_VERY_SURE_I_WANT_AN_OPEN_REGISTRATION_SERVER_PRONE_TO_ABUSE: "true"
      TUWUNEL_AUTO_JOIN_ROOMS: "[\"#lobby:${MATRIX_SERVER_NAME:-matrix.localhost}\",\"#personal:${MATRIX_SERVER_NAME:-matrix.localhost}\"]"
      # Tuwunel requires the internal @conduit user to exist before reopening a
      # non-empty database, so the admin-room bootstrap path must stay enabled.
      TUWUNEL_CREATE_ADMIN_ROOM: "true"
      TUWUNEL_WELL_KNOWN__CLIENT: ${CLIENT_HOMESERVER_URL:-http://localhost:8008}
    volumes:
      - tuwunel_data:/var/lib/tuwunel
    ports:
      - "8008:8008"
    restart: unless-stopped

  mindroom:
    image: ${MINDROOM_IMAGE:-ghcr.io/mindroom-ai/mindroom:latest}
    environment:
      - MATRIX_HOMESERVER=http://tuwunel:8008
      - MATRIX_SERVER_NAME=${MATRIX_SERVER_NAME:-matrix.localhost}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - MINDROOM_STORAGE_PATH=/app/mindroom_data
      - HOME=/app
      - MEM0_DIR=/app/mindroom_data/memory/mem0
      - MINDROOM_PORT=8765
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OLLAMA_HOST=${OLLAMA_HOST:-http://localhost:11434}
    volumes:
      - ./config.yaml:/app/config.yaml
      - ./mind_data:/app/mind_data
      - mindroom_data:/app/mindroom_data
      - mindroom_logs:/app/logs
    depends_on:
      tuwunel:
        condition: service_started
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          /app/.venv/bin/python -c "import os, urllib.request; server =
          os.environ.get('MATRIX_SERVER_NAME', 'matrix.localhost'); urls =
          ['http://127.0.0.1:8765/'] + [f'http://tuwunel:8008/_matrix/client/v3/directory/room/%23{name}%3A{server}'
          for name in ('lobby', 'personal')];
          [urllib.request.urlopen(url, timeout=5).read() for url in urls]"
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 5s
    ports:
      - "8765:8765"
    restart: unless-stopped

  element:
    image: ${MINDROOM_CLIENT_IMAGE:-ghcr.io/mindroom-ai/mindroom-cinny:latest}
    environment:
      - CLIENT_HOMESERVER_URL=${CLIENT_HOMESERVER_URL:-http://localhost:8008}
      - APP_BASE_PATH=/
      - APP_ENABLE_SERVICE_WORKER=true
    volumes:
      - ./client-config.json:/app/config.template.json:ro
    command: >
      sh -c "envsubst < /app/config.template.json > /app/config.json && exec nginx -g 'daemon off;'"
    depends_on:
      mindroom:
        condition: service_healthy
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/config.json"]
      interval: 30s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  tuwunel_data:
  mindroom_data:
  mindroom_logs:
